name: Build LayerPdfExport bundle

# Node 24 for JS actions (upload-artifact etc.); see GitHub deprecation of Node 20 runners.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  push:
    paths:
      - "design_automation/LayerPdfExport/**"
      - ".github/workflows/build-layer-pdf-bundle.yml"
  pull_request:
    paths:
      - "design_automation/LayerPdfExport/**"
      - ".github/workflows/build-layer-pdf-bundle.yml"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: dotnet build
        run: dotnet build design_automation/LayerPdfExport/LayerPdfExport.csproj -c Release

      - name: Verify bundle outputs
        shell: pwsh
        run: |
          $contents = "design_automation/LayerPdfExport/LayerPdfExport.bundle/Contents"
          foreach ($f in @("LayerPdfExport.dll", "LayerPdfExport.deps.json", "run.scr", "run_flat.scr", "run_all_layouts.scr", "run_layout_dwgs.scr")) {
            $p = Join-Path $contents $f
            if (-not (Test-Path $p)) { throw "Missing after build: $p" }
          }

      - name: Zip bundle folder
        shell: pwsh
        run: |
          Set-Location design_automation/LayerPdfExport
          if (-not (Test-Path "LayerPdfExport.bundle/PackageContents.xml")) { throw "Bundle layout missing" }
          $zip = Join-Path $env:GITHUB_WORKSPACE "LayerPdfExport_bundle.zip"
          # Zip must have PackageContents.xml at the **root** (DA rejects a zip whose only root is
          # a single folder LayerPdfExport.bundle/). Compress from inside the .bundle directory.
          Push-Location LayerPdfExport.bundle
          try {
            Compress-Archive -Path * -DestinationPath $zip -Force
          } finally {
            Pop-Location
          }
          if (-not (Test-Path $zip)) { throw "Zip was not created: $zip" }
          Get-Item $zip | Format-List FullName, Length

      - uses: actions/upload-artifact@v6
        with:
          name: LayerPdfExport_bundle
          path: LayerPdfExport_bundle.zip
          if-no-files-found: error
