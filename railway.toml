# Railway config-as-code: https://docs.railway.com/guides/config-as-code
# Set secret values in the Railway dashboard: Service → Variables (do not commit secrets).
#
# If `railway up` times out, deploy from GitHub instead (clone + build on Railway).
# See railway-github-deploy.txt

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Uses PORT from Railway; Dockerfile CMD runs uvicorn on $PORT
healthcheckPath = "/ready"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
