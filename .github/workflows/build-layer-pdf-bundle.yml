name: Build LayerPdfExport bundle

# Node 24 for JS actions (upload-artifact etc.); see GitHub deprecation of Node 20 runners.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    paths:
      - "design_automation/LayerPdfExport/**"
      - ".github/workflows/build-layer-pdf-bundle.yml"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "8.0.x"

      - name: dotnet build
        run: dotnet build design_automation/LayerPdfExport/LayerPdfExport.csproj -c Release

      - name: Zip bundle folder
        shell: pwsh
        run: |
          Set-Location design_automation/LayerPdfExport
          if (-not (Test-Path "LayerPdfExport.bundle/PackageContents.xml")) { throw "Bundle layout missing" }
          # Two levels up: LayerPdfExport -> design_automation -> repo root (../../../ was wrong: wrote outside workspace).
          $zip = Join-Path $env:GITHUB_WORKSPACE "LayerPdfExport_bundle.zip"
          Compress-Archive -Path "LayerPdfExport.bundle" -DestinationPath $zip -Force
          if (-not (Test-Path $zip)) { throw "Zip was not created: $zip" }
          Get-Item $zip | Format-List FullName, Length

      - uses: actions/upload-artifact@v6
        with:
          name: LayerPdfExport_bundle
          path: LayerPdfExport_bundle.zip
